name: AI Test & Coverage Check
on:
  push:
    branches: [ "test_loc" ]
  pull_request:
    branches: [ "test_loc" ]
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Compile source code
      run: |
        mkdir -p bin
        find Test_automation/src -name "*.java" > sources.txt
        javac -d bin @sources.txt

    - name: Detect changed Java files
      id: changes
      run: |
        git fetch origin test_loc
        CHANGED=$(git diff --name-only origin/test_loc | grep 'Test_automation/src/.*\.java$' || true)
        echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

    - name: Generate missing test files with EvoSuite
      run: |
        mkdir -p Test_automation/src/test/java
        for file in ${{ steps.changes.outputs.changed_files }}; do
          CLASS_PATH=$(echo "$file" | sed 's|Test_automation/src/||')
          CLASS_NAME=$(echo "$CLASS_PATH" | sed 's|/|.|g' | sed 's|.java||')
          TEST_FILE="Test_automation/src/test/java/$(echo "$CLASS_PATH" | sed 's|.java|Test.java|')"
          if [ ! -f "$TEST_FILE" ]; then
            echo "Generating test for $CLASS_NAME"
            java -jar Test_automation/tools/evosuite-1.2.0.jar -class $CLASS_NAME -projectCP bin -Dtest_dir=Test_automation/src/test/java
          else
            echo "Test already exists for $CLASS_NAME"
          fi
        done

    - name: Compile test classes
      run: |
        mkdir -p Test_automation/bin
        find Test_automation/src/test/java -name "*.java" > test_sources.txt
        cat test_sources.txt
        javac -cp "Test_automation/bin:Test_automation/tools/junit-4.13.2.jar:Test_automation/tools/hamcrest-core-2.2.jar:tools/hamcrest-2.2.jar" -d Test_automation/bin @test_sources.txt

    - name: Run tests with JaCoCo agent
      run: |
        TEST_CLASSES=$(find Test_automation/src/test/java -name "*Test.java" | sed 's|Test_automation/src/test/java/||' | sed 's|/|.|g' | sed 's|.java||')
        for test in $TEST_CLASSES; do
          java -javaagent:Test_automation/tools/jacocoagent.jar=destfile=jacoco.exec \
            -cp "Test_automation/bin:Test_automation/tools/junit-4.13.2.jar:Test_automation/tools/hamcrest-core-2.2.jar" \
            org.junit.runner.JUnitCore $test || true
        done

    - name: Generate coverage report
      run: |
        mkdir -p report
        java -jar Test_automation/tools/jacococli.jar report jacoco.exec \
          --classfiles Test_automation/bin \
          --sourcefiles Test_automation/src \
          --html Test_automation/report \
          --xml Test_automation/report/report.xml

    - name: Enforce 95% coverage threshold
      run: |
        MISSED=$(grep -oPm1 "(?<=missed=\")[0-9]+" Test_automationreport/report.xml)
        COVERED=$(grep -oPm1 "(?<=covered=\")[0-9]+" Test_automation/report/report.xml)
        TOTAL=$((MISSED + COVERED))
        PERCENT=$(echo "scale=2; $COVERED*100/$TOTAL" | bc)
        echo "Coverage: $PERCENT%"
        if (( $(echo "$PERCENT < 95" | bc -l) )); then
          echo "Test coverage $PERCENT% is below threshold."
          exit 1
        fi
